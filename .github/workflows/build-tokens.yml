name: Build Design Tokens

on:
  push:
    branches: [main]
    paths:
      - 'tokens.json'
      - 'scripts/**'
      - '.github/workflows/build-tokens.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate tokens
        run: node scripts/validate.js

      - name: Build tokens
        run: node scripts/build.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet dist/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit generated files
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "chore: regenerate design tokens"
          git push

      - name: Tag version
        if: steps.changes.outputs.changed == 'true'
        run: |
          VERSION=$(node -p "require('./tokens.json').meta.version")
          git tag -f "v${VERSION}"
          git push -f origin "v${VERSION}"
